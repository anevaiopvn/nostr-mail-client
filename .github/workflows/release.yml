name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  build-android:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Signing
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/russel.p12
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=russel.p12" >> android/key.properties

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Android APK (universal)
        run: flutter build apk --release

      - name: Rename universal APK
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/nmail-${VERSION}-android-universal.apk

      - name: Build Android APK (arm64)
        run: flutter build apk --release --target-platform android-arm64

      - name: Rename arm64 APK
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/nmail-${VERSION}-android-arm64.apk

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Rename AAB
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          cp build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/nmail-${VERSION}-android.aab

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: nmail-apk
          path: build/app/outputs/flutter-apk/nmail-${{ steps.get_version.outputs.version }}-android-*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v7
        with:
          name: nmail-aab
          path: build/app/outputs/bundle/release/nmail-${{ steps.get_version.outputs.version }}-android.aab

  build-linux:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libfuse2 locate
          wget -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install Fastforge
        run: dart pub global activate fastforge

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Linux packages
        run: fastforge package --platform linux --targets deb,appimage

      - name: Rename Linux packages
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          mv dist/**/*.deb dist/nmail-${VERSION}-linux.deb
          mv dist/**/*.AppImage dist/nmail-${VERSION}-linux.AppImage

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: nmail-deb
          path: dist/*.deb

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: nmail-appimage
          path: dist/*.AppImage

  create-release:
    runs-on: ubuntu-latest
    needs: [build-android, build-linux]
    steps:
      - uses: actions/checkout@v6

      - name: Download APK
        uses: actions/download-artifact@v8
        with:
          name: nmail-apk
          path: release-artifacts

      - name: Download AAB
        uses: actions/download-artifact@v8
        with:
          name: nmail-aab
          path: release-artifacts

      - name: Download .deb
        uses: actions/download-artifact@v8
        with:
          name: nmail-deb
          path: release-artifacts

      - name: Download AppImage
        uses: actions/download-artifact@v8
        with:
          name: nmail-appimage
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
