name: nostr_mail_client
description: "Everyone has an email address but nobody owns it. Nostr solves this."
publish_to: 'none'
version: 0.12.1+17

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  get: ^4.7.3
  ndk: ^0.8.4-dev.1
  ndk_flutter: ^0.8.4-dev.1
  path_provider: ^2.1.5
  sembast: ^3.8.6
  toastification: ^3.0.3
  nostr_mail: ^2.0.2
  http: ^1.6.0
  intl: ^0.20.2
  sembast_web: ^2.4.4+1
  path: ^1.9.1
  url_launcher: ^6.3.2
  flutter_widget_from_html_core: ^0.17.0
  flutter_quill: ^11.5.1
  vsc_quill_delta_to_html: ^1.0.5
  markdown_quill: ^4.3.0
  system_theme: ^3.2.0
  flutter_svg: ^2.2.4
  window_manager: ^0.5.1
  file_picker: ^11.0.2
  enough_mail_plus: ^2.2.4
  introduction_screen: ^4.0.0
  collection: ^1.19.1
  file_saver: ^0.4.0
  flutter_highlight: ^0.7.0
  pdfrx: ^2.2.24
  mime: ^2.0.0
  blossom_cache: ^0.3.0
  idb_shim: ^2.9.2
  idb_sqflite: ^1.4.1+1
  sqflite: ^2.4.2+1
  sqflite_common_ffi: ^2.4.0+3
  broadcast_queue_shim_for_ndk: ^0.2.0
  blossom_upload_queue_shim_for_ndk: ^0.4.0
  package_info_plus: ^9.0.1
  go_router: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  macos:
    generate: true
    image_path: "icons/web/icon-512.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - icons/original_transparent_2x.svg
    - icons/original_transparent_3x.png
    - icons/github.svg
